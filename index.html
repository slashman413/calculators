<body>
<div class="wrap">
  <div class="topbar"><span style="font-size:24px">🧮</span><h1 data-i18n="title">Free Online Calculators</h1><button class="lang-btn" id="langBtn" onclick="toggleLang()">中</button></div>
  <div class="sub" data-i18n="sub">Everyday calculators — BMI, percentage, loan, age & tip.</div>
  <div class="tabs">
    <button class="tab on" data-p="bmi">BMI</button>
    <button class="tab" data-p="pct" data-i18n="t_pct">Percentage</button>
    <button class="tab" data-p="loan" data-i18n="t_loan">Loan</button>
    <button class="tab" data-p="age" data-i18n="t_age">Age</button>
    <button class="tab" data-p="tip" data-i18n="t_tip">Tip</button>
  </div>
  <div class="card">
    <div class="pane on" id="bmi">
      <div class="rowL"><label data-i18n="weight">Weight (kg)</label><input type="number" id="bw" value="65" oninput="calcBmi()"></div>
      <div class="rowL"><label data-i18n="height">Height (cm)</label><input type="number" id="bh" value="170" oninput="calcBmi()"></div>
      <div class="res" id="rbmi"></div>
    </div>
    <div class="pane" id="pct">
      <div class="rowL"><label>X</label><input type="number" id="px" value="25" oninput="calcPct()"><label data-i18n="pof">% of</label><input type="number" id="py" value="200" oninput="calcPct()"></div>
      <div class="res" id="rpct"></div>
    </div>
    <div class="pane" id="loan">
      <div class="rowL"><label data-i18n="amount">Amount</label><input type="number" id="la" value="1000000" oninput="calcLoan()"></div>
      <div class="rowL"><label data-i18n="rate">Annual rate %</label><input type="number" id="lr" value="3" step="0.1" oninput="calcLoan()"></div>
      <div class="rowL"><label data-i18n="years">Years</label><input type="number" id="ly" value="20" oninput="calcLoan()"></div>
      <div class="res" id="rloan"></div>
    </div>
    <div class="pane" id="age">
      <div class="rowL"><label data-i18n="birth">Birth date</label><input type="date" id="ab" value="1990-01-01" style="width:160px" oninput="calcAge()"></div>
      <div class="res" id="rage"></div>
    </div>
    <div class="pane" id="tip">
      <div class="rowL"><label data-i18n="bill">Bill</label><input type="number" id="tb" value="1000" oninput="calcTip()"></div>
      <div class="rowL"><label data-i18n="tippct">Tip %</label><input type="number" id="tp" value="10" oninput="calcTip()"></div>
      <div class="rowL"><label data-i18n="people">People</label><input type="number" id="tn" value="1" oninput="calcTip()"></div>
      <div class="res" id="rtip"></div>
    </div>
  </div>
  <ins class="adsbygoogle ad-slot" style="display:block" data-ad-client="ca-pub-5115666613619890" data-ad-format="auto" data-full-width-responsive="true"></ins>

  <details><summary data-i18n="q1">Is it free & private? / 免費且隱私嗎？</summary><p data-i18n="a1">Yes — all calculations run locally in your browser, nothing is sent anywhere. 是，全部在瀏覽器本機運算，不外傳。</p></details>

</div>
<script>
  const $=id=>document.getElementById(id);
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));$(b.dataset.p).classList.add('on');}));
  const EN=LANG=>LANG==='en';
  function calcBmi(){const w=+$("bw").value,h=+$("bh").value/100;if(!w||!h){$("rbmi").textContent='';return;}const b=w/(h*h);let c=b<18.5?'Underweight 過輕':b<24?'Normal 正常':b<27?'Overweight 過重':'Obese 肥胖';$("rbmi").innerHTML='<b>'+b.toFixed(1)+'</b>'+c;}
  function calcPct(){const x=+$("px").value,y=+$("py").value;$("rpct").innerHTML='<b>'+(x/100*y).toLocaleString()+'</b>'+x+'% of '+y;}
  function calcLoan(){const p=+$("la").value,r=+$("lr").value/100/12,n=+$("ly").value*12;if(!p||!n){$("rloan").textContent='';return;}const m=r?p*r/(1-Math.pow(1+r,-n)):p/n;$("rloan").innerHTML='<b>'+Math.round(m).toLocaleString()+'</b>'+(EN(LANG)?'per month · total ':'每月 · 總計 ')+Math.round(m*n).toLocaleString();}
  function calcAge(){const d=new Date($("ab").value);if(isNaN(d)){$("rage").textContent='';return;}const now=new Date();let y=now.getFullYear()-d.getFullYear();let mo=now.getMonth()-d.getMonth();if(mo<0||(mo===0&&now.getDate()<d.getDate())){y--;mo+=12;}const days=Math.floor((now-d)/86400000);$("rage").innerHTML='<b>'+y+(EN(LANG)?' years':' 歲')+'</b>'+days.toLocaleString()+(EN(LANG)?' days old':' 天');}
  function calcTip(){const b=+$("tb").value,p=+$("tp").value,n=Math.max(1,+$("tn").value);const tip=b*p/100,tot=b+tip;$("rtip").innerHTML='<b>'+Math.round(tot).toLocaleString()+'</b>'+(EN(LANG)?'total · tip ':'總計 · 小費 ')+Math.round(tip).toLocaleString()+(n>1?(EN(LANG)?' · each ':' · 每人 ')+Math.round(tot/n).toLocaleString():'');}
  window.calcBmi=calcBmi;window.calcPct=calcPct;window.calcLoan=calcLoan;window.calcAge=calcAge;window.calcTip=calcTip;
  const I18N={title:["Free Online Calculators","免費線上計算機"],sub:["Everyday calculators — BMI, percentage, loan, age & tip.","常用計算機 — BMI、百分比、貸款、年齡、小費。"],t_pct:["Percentage","百分比"],t_loan:["Loan","貸款"],t_age:["Age","年齡"],t_tip:["Tip","小費"],weight:["Weight (kg)","體重 (kg)"],height:["Height (cm)","身高 (cm)"],pof:["% of","% of"],amount:["Amount","金額"],rate:["Annual rate %","年利率 %"],years:["Years","年數"],birth:["Birth date","生日"],bill:["Bill","帳單"],tippct:["Tip %","小費 %"],people:["People","人數"],q1:["Is it free & private? / 免費且隱私嗎？","Is it free & private?"],a1:["Yes — all calculations run locally in your browser, nothing is sent anywhere. 是，全部在瀏覽器本機運算，不外傳。","Yes — all calculations run locally; nothing is sent anywhere."],home:["← AI工具人 Home","← 回 AI工具人首頁"],terms:["Terms","服務說明"],privacy:["Privacy","隱私權政策"]};
  let LANG=localStorage.getItem('site_lang')||'en';
  function setLang(l){LANG=l;const i=l==='en'?0:1;document.querySelectorAll('[data-i18n]').forEach(el=>{const t=I18N[el.getAttribute('data-i18n')];if(t)el.textContent=t[i]});document.documentElement.lang=l==='en'?'en':'zh-TW';$("langBtn").textContent=l==='en'?'中':'EN';localStorage.setItem('site_lang',l);}
  function toggleLang(){setLang(LANG==='en'?'zh':'en');calcBmi();calcPct();calcLoan();calcAge();calcTip();}window.toggleLang=toggleLang;
  setLang(LANG);calcBmi();calcPct();calcLoan();calcAge();calcTip();
  document.addEventListener('click',function(ev){var a=ev.target.closest&&ev.target.closest('a');if(!a||!a.href||typeof gtag!=='function')return;if(a.href.indexOf('slashman413.github.io')>-1)gtag('event','internal_click',{link_url:a.href});});
  try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}
</script>
